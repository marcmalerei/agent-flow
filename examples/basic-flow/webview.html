<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Flow Example Webview</title>
  <style>
    :root {
      --vscode-editor-background: #1e1e1e;
      --vscode-editor-foreground: #d4d4d4;
      --vscode-sideBar-background: #181818;
      --vscode-panel-background: #181818;
      --vscode-panel-border: #2b2b2b;
      --vscode-input-background: #1f1f1f;
      --vscode-input-foreground: #cccccc;
      --vscode-input-border: #3c3c3c;
      --vscode-button-background: #0e639c;
      --vscode-button-foreground: #ffffff;
      --vscode-button-hoverBackground: #1177bb;
      --vscode-button-secondaryBackground: #313131;
      --vscode-button-secondaryForeground: #cccccc;
      --vscode-button-secondaryHoverBackground: #3c3c3c;
      --vscode-focusBorder: #007fd4;
      --vscode-descriptionForeground: #9d9d9d;
      --vscode-charts-blue: #3794ff;
      --vscode-charts-purple: #b180d7;
      --vscode-charts-orange: #d18616;
      --vscode-charts-green: #89d185;
      --vscode-charts-yellow: #cca700;
      --vscode-charts-red: #f14c4c;
      --vscode-textLink-foreground: #3794ff;
      --vscode-editorWidget-background: #252526;
      --vscode-editorWidget-border: #454545;
      --vscode-list-hoverBackground: #2a2d2e;
      --vscode-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import { validatePipeline } from '/src/pipeline/validator.ts';
    import { calculateRiskScore } from '/src/pipeline/riskScore.ts';
    import { generateFiles } from '/src/pipeline/generators/index.ts';
    import { buildToolOptionGroups } from '/src/webview/toolOptions.ts';

    window.__AGENTFLOW_DEV_MESSAGES__ = [];
    window.acquireVsCodeApi = () => ({
      postMessage(message) {
        window.__AGENTFLOW_DEV_MESSAGES__.push(message);
        window.__AGENTFLOW_LAST_MESSAGE__ = message;
      }
    });

    const response = await fetch('/examples/basic-flow/.agent-pipeline/pipeline.json');
    const pipeline = await response.json();
    window.__AGENTFLOW_STATE__ = {
      pipeline,
      findings: validatePipeline(pipeline),
      risk: calculateRiskScore(pipeline),
      generatedFiles: generateFiles(pipeline).map((file) => ({ path: file.path, kind: file.kind })),
      flowLayout: 'compact',
      toolOptions: buildToolOptionGroups([
        { name: 'runSubagent', description: 'Run a task within an isolated subagent context.', inputSchema: undefined, tags: ['agent'] },
        { name: 'dbcode_updateTools', description: 'Update database tools.', inputSchema: undefined, tags: [] },
        { name: 'gitkraken_updateTools', description: 'Update GitKraken tools.', inputSchema: undefined, tags: [] }
      ])
    };

    await import('/src/webview/main.tsx');
  </script>
</body>
</html>
