name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Require changelog update
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          if ! git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep -qx 'CHANGELOG.md'; then
            echo "::error::Pull requests must update CHANGELOG.md under the Unreleased section."
            exit 1
          fi

      - name: Compile and test
        run: npm run check

      - name: Extension host smoke
        run: xvfb-run -a npm run test:smoke

      - name: Build webview
        run: npm run build:webview

      - name: Audit dependencies
        run: npm audit
